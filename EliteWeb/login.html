<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - Dành cho Học viên</title>
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .login-wrap {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: url('assets/hero_bg.png') center/cover no-repeat;
            position: relative;
        }
        .login-wrap::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, rgba(2, 6, 23, 0.7), rgba(2, 6, 23, 0.9));
        }
        .login-card {
            position: relative; z-index: 2;
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(15px);
            padding: 50px 40px;
            border-radius: var(--radius);
            border: 1px solid var(--border);
            width: 100%; max-width: 450px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
        }
        .login-card .logo { justify-content: center; margin-bottom: 30px; }
        .login-card h2 { margin-bottom: 30px; font-size: 24px; }
        .input-group { margin-bottom: 20px; text-align: left; }
        .input-group label { display: block; margin-bottom: 8px; color: var(--text-muted); font-size: 14px; }
        .input-group input {
            width: 100%; padding: 12px 16px;
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid var(--border);
            border-radius: 8px; color: white;
            font-family: inherit; transition: var(--transition);
        }
        .input-group input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2); }
        .login-btn { width: 100%; margin-top: 10px; }
        .back-link { display: block; margin-top: 24px; color: var(--text-muted); font-size: 14px; }
        .back-link:hover { color: var(--accent); }
        .error-msg {
            background: rgba(244, 63, 94, 0.15);
            border: 1px solid rgba(244, 63, 94, 0.3);
            color: #FDA4AF;
            padding: 10px 15px;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 20px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="login-wrap">
        <div class="login-card fade-up visible">
            <a href="index.html" class="logo">
                <span class="logo-icon"><i class="fa-solid fa-globe"></i></span>
                ELITE
            </a>
            <h2>Đăng nhập Hệ thống</h2>
            <div id="errorMsg" class="error-msg"></div>
            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="input-group">
                    <label for="username">Mã học viên</label>
                    <input type="text" id="username" placeholder="Ví dụ: EL-2026-0042" required autocomplete="off">
                </div>
                <div class="input-group">
                    <label for="password">Mật khẩu</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>
                <button type="submit" id="loginBtn" class="btn btn-primary login-btn">Đăng nhập ngay</button>
            </form>
            <a href="index.html" class="back-link"><i class="fa-solid fa-arrow-left"></i> Quay lại trang chủ</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
    <script>
        // If already logged in, redirect
        (async () => {
            const session = await getSession();
            if (session) {
                const profile = await getProfile();
                if (profile && profile.role === 'student') {
                    window.location.href = 'student_dashboard.html';
                }
            }
        })();

        async function handleLogin(e) {
            e.preventDefault();
            const rawUsername = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            
            // Tự động thêm đuôi email hệ thống nếu học viên chỉ nhập mã học viên
            const email = rawUsername.includes('@') ? rawUsername : `${rawUsername}@elite.edu.vn`.toLowerCase();

            const btn = document.getElementById('loginBtn');
            const errEl = document.getElementById('errorMsg');

            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Đang xác thực...';
            errEl.style.display = 'none';

            try {
                await signIn(email, password);
                const profile = await getProfile();

                if (!profile || profile.role !== 'student') {
                    await signOut();
                    throw new Error('Tài khoản này không phải là học viên.');
                }

                window.location.href = 'student_dashboard.html';
            } catch (err) {
                errEl.textContent = err.message === 'Invalid login credentials'
                    ? 'Email hoặc mật khẩu không đúng.'
                    : err.message;
                errEl.style.display = 'block';
                btn.disabled = false;
                btn.innerHTML = 'Đăng nhập ngay';
            }
        }
    </script>
</body>
</html>
